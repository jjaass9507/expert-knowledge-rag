{% extends "base.html" %}
{% block view %}新增口述{% endblock %}
{% block content %}
<div class="section-head">
  <h1>新增口述</h1>
  <p class="meta">貼上逐字稿或直接描述經驗，系統會自動整理為知識卡片草稿。</p>
</div>

{% if error %}<p class="notice-error">{{ error }}</p>{% endif %}

<form method="post" action="{{ url_for('submit') }}" class="form">
  <label class="field">
    <span class="label">更新人</span>
    <input type="text" name="更新人" value="{{ 更新人 or '' }}" placeholder="工號或姓名">
  </label>
  <label class="field">
    <span class="label">逐字稿 / 描述</span>
    <textarea name="逐字稿" rows="12" placeholder="請說明：遇到什麼狀況？你判斷是什麼原因？怎麼處理？有什麼要注意的？">{{ 逐字稿 or '' }}</textarea>
  </label>
  <div class="actions">
    <button type="submit" class="btn-primary">整理為知識卡片</button>
  </div>
</form>
{% endblock %}
