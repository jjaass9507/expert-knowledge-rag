{% extends "base.html" %}
{% from "_icons.html" import icon %}
{% block title %}新增口述 · EKR Intelligence{% endblock %}
{% block content %}
<div class="toolbar">
  <div class="toolbar-left">
    <h1>新增口述</h1>
    <span class="count-chip">文字 / 語音 → 自動結構化</span>
  </div>
</div>

<div class="page">
  {% if error %}<p class="notice-error">{{ error }}</p>{% endif %}

  <form method="post" action="{{ url_for('submit') }}" class="form panel" enctype="multipart/form-data">
    <label class="field">
      <span class="label">更新人</span>
      <input type="text" name="更新人" value="{{ 更新人 or '' }}" placeholder="工號或姓名">
    </label>
    <label class="field">
      <span class="label">語音輸入<span class="hint">上傳錄音檔，系統自動轉文字</span></span>
      <input type="file" name="音檔" accept="audio/*">
    </label>
    <label class="field">
      <span class="label">逐字稿 / 描述<span class="hint">未上傳音檔時直接填寫</span></span>
      <textarea name="逐字稿" rows="12" placeholder="請說明：遇到什麼狀況？你判斷是什麼原因？怎麼處理？有什麼要注意的？">{{ 逐字稿 or '' }}</textarea>
    </label>
    <div class="actions">
      <button type="submit" class="btn-primary">{{ icon('add') }}整理為知識卡片</button>
    </div>
  </form>
</div>
{% endblock %}
