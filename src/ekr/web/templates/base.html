<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}中央知識庫{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{{ url_for('index') }}">中央知識庫</a>
      <span class="view">{% block view %}{% endblock %}</span>
      <nav class="topnav">
        <a href="{{ url_for('index') }}">待校稿</a>
        <a href="{{ url_for('submit') }}">新增口述</a>
      </nav>
    </div>
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
