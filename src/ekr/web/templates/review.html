{% extends "base.html" %}
{% block title %}校稿 {{ card.id }} · EKR Intelligence{% endblock %}
{% block content %}
<div class="toolbar">
  <div class="toolbar-left">
    <h1 class="mono">{{ card.id }}</h1>
    <span class="pill pill-pending">待校稿</span>
    <span class="count-chip">更新人 {{ card.更新人 }} · {{ card.最後更新 }}</span>
  </div>
</div>

<div class="page">
  {% if error %}<p class="notice-error">{{ error }}</p>{% endif %}

  <form method="post" action="{{ url_for('approve', card_id=card.id) }}" class="desk">
    <div class="desk-grid">
      <!-- 左：原始逐字稿 -->
      <section class="manuscript">
        <div class="pane-head"><span class="pane-title">原始逐字稿</span></div>
        <blockquote class="transcript">{{ card.原始逐字稿 }}</blockquote>
      </section>

      <!-- 右：結構化卡片（可編輯） -->
      <section class="cardform">
        <div class="pane-head"><span class="pane-title">結構化卡片</span></div>

        <label class="field">
          <span class="label">標題</span>
          <input type="text" name="標題" value="{{ card.標題 }}">
        </label>

        <label class="field">
          <span class="label">內容</span>
          <textarea name="內容" rows="8">{{ card.內容 }}</textarea>
        </label>

        <label class="field">
          <span class="label">重點<span class="hint">每行一條，速查用</span></span>
          <textarea name="重點" rows="4" placeholder="每行一條重點">{{ card.重點 | join('\n') }}</textarea>
        </label>

        <label class="field">
          <span class="label">標籤<span class="hint">逗號分隔</span></span>
          <input type="text" name="標籤" value="{{ card.標籤 | join(', ') }}">
        </label>

        <div class="field-row">
          <label class="field">
            <span class="label">知識類型</span>
            <select name="知識類型">
              {% for t in knowledge_types %}
              <option value="{{ t }}" {% if t == card.知識類型.value %}selected{% endif %}>{{ t }}</option>
              {% endfor %}
            </select>
          </label>
          <label class="field">
            <span class="label">設備大分類</span>
            <select name="大分類">
              <option value="" {% if not card.大分類 %}selected{% endif %}>（未分類）</option>
              {% for g in categories %}
              <option value="{{ g }}" {% if g == card.大分類 %}selected{% endif %}>{{ g }}</option>
              {% endfor %}
            </select>
          </label>
          <label class="field">
            <span class="label">信心等級</span>
            <select name="信心等級">
              {% for c in confidences %}
              <option value="{{ c }}" {% if c == card.信心等級.value %}selected{% endif %}>{{ c }}</option>
              {% endfor %}
            </select>
          </label>
        </div>

        <label class="field">
          <span class="label">適用範圍<span class="hint">機型 / 系統 / 情境</span></span>
          <input type="text" name="適用範圍" value="{{ card.適用範圍 }}">
        </label>

        <label class="field">
          <span class="label">補充說明<span class="hint">給 LLM 的修改意見，按「退回重整理」套用</span></span>
          <textarea name="補充說明" rows="2" placeholder="例如：信心等級應為高；補上型號 RTHD；內容太精簡，請保留壓力數值"></textarea>
        </label>
      </section>
    </div>

    <div class="actions desk-actions">
      <button type="submit" class="btn-primary">確認，加入知識庫</button>
      <button type="submit" formaction="{{ url_for('restructure', card_id=card.id) }}" class="btn-ghost">退回重整理</button>
      <button type="submit" formaction="{{ url_for('reject', card_id=card.id) }}" class="btn-ghost danger">退件</button>
    </div>
  </form>
</div>
{% endblock %}
